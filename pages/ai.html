<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Buddy AI</title>
<link rel="stylesheet" href="../css/ai.css">
</head>

<body>

<div class="close-btn" onclick="window.location.href='../index.html#cylinder'" style="color:azure">✖</div>

<div class="ai-container">

    <div class="ai-header">
        <h1>Study Buddy AI</h1>
    </div>

    <div class="start-screen" id="startScreen">
        <button class="start-btn" id="startBtn">Start Chatting</button>
    </div>

    <div class="chat-ui hidden" id="chatUi">
        <div class="chat-box" id="chatBox"></div>

        <form class="chat-form" id="chatForm">
            <input id="messageInput" type="text"
                   placeholder="Type your study question..."
                   autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>

</div>

<script src="../javaScript/ai.js"></script>
</body>
</html>
