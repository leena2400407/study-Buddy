<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile information</title>
        <link rel="stylesheet" href="../css/forms.css">
        

</head>
<body>
    <div class="close-btn" onclick="window.location.href='cylinder.html#trigger-logo'" style="color:azure">✖</div>

 <div class="container auth-page">   
<div id="info">
    <div class="login-box signup-box">
        <h2>Full Profile Info</h2>
        <div class="profile-avatar"> 
            <img src="../assests/images/profile.png" alt="Student Profile Avatar" class="profile-avatar-img">
        </div>
        <div id="admin-profile-note" class="profile-info" style="display:none; color: #f1c40f; margin-bottom: 20px;">
            Admin profile details are not available.
        </div>
        <div class="profile-details">
            <div class="input-group">
                <label>Full Name</label>
                <div id="profile-name" class="profile-value">-</div>
            </div>
            <div class="input-group">
                <label>Username</label>
                <div id="profile-username" class="profile-value">-</div>
            </div>
            <div class="input-group">
                <label>Gender</label>
                <div id="profile-gender" class="profile-value">-</div>
            </div>
            <div class="input-group">
                <label>University</label>
                <div id="profile-university" class="profile-value">-</div>
            </div>
            <div class="input-group">
                <label>Major</label>
                <div id="profile-major" class="profile-value">-</div>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <div id="profile-email" class="profile-value">-</div>
            </div>
        </div>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
</div>
</div>

<script>
    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    }

    const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!currentUser) {
        window.location.href = 'LogIn.html';
    } else if (currentUser.role === 'admin') {
        document.getElementById('admin-profile-note').style.display = 'block';
        document.querySelector('.profile-details').style.display = 'none';
    } else {
        document.getElementById('profile-name').textContent = currentUser.name || '-';
        document.getElementById('profile-username').textContent = currentUser.username || '-';
        document.getElementById('profile-gender').textContent = currentUser.gender || '-';
        document.getElementById('profile-university').textContent = currentUser.university || '-';
        document.getElementById('profile-major').textContent = currentUser.major || '-';
        document.getElementById('profile-email').textContent = currentUser.email || '-';
    }
</script>
</body>
</html>
