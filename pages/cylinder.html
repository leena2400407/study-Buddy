<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Buddy - Cylinder</title>
    <link rel="stylesheet" href="../css/home.css"> 
</head>
<body>
    <div id="bg-effects"></div>
  
    <div id="features-page" style="display: flex;">
        <div class="scene" id="cylinder-scene" style="display: flex;">
            <div>
               <div class="home" onclick="window.location.href='../index.html'">Home</div> 
               <div class="dropdown" style="right: 120px; ">
                <button class="dropbtn" onclick="toggleDropdown()" style="background: none;border: none ;color: azure; cursor: pointer; padding: 5px 10px; font-weight: bold; ">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 5px;">
                        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                        <path d="M3 5V19A9 3 0 0 0 21 19V5"></path>
                        <ellipse cx="12" cy="19" rx="9" ry="3"></ellipse>
                    </svg>
                    Cylinder ▾
                </button>
                <div id="myDropdown" class="dropdown-content" style="display: none; position: absolute; background-color: rgba(0,0,0,0.9); min-width: 160px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); border-radius: 8px; margin-top: 5px;">
                    <a href="#" onclick="scrollToCell('event')" style="color: white; padding: 12px 16px; text-decoration: none; display: block;">Events 🎭</a>
                    <a href="#" onclick="scrollToCell('game')" style="color: white; padding: 12px 16px; text-decoration: none; display: block;">Game 🎮</a>
                    <a href="#" onclick="scrollToCell('resources-card')" style="color: white; padding: 12px 16px; text-decoration: none; display: block;">Resources 📚</a>
                    <a href="#" onclick="scrollToCell('match')" style="color: white; padding: 12px 16px; text-decoration: none; display: block;">Match 🔥</a>
                    <a href="#" onclick="scrollToCell('ai-chat')" style="color: white; padding: 12px 16px; text-decoration: none; display: block;">AI Chat 🤖</a>
                </div>
            </div>
            <div class="Cylinder" id="Cylinder">
                
                <div class="cylinder__lid" id="trigger-logo">START</div>
                
                <div class="Cylinder__cell" id="event">
                    <h3>EVENTS 🎭</h3>
                    <p style="font-size: 1.2rem; margin-top: 10px;">Fun & Sports</p>
                </div>
                <div class="Cylinder__cell">
                    <h3>GAME 🎮</h3>
                    <p style="font-size: 1.2rem;">Block Blast</p>
                </div>
                <div class="Cylinder__cell" id="resources-card">
                    <h3>RESOURCES 📚</h3>
                    <p style="font-size: 1.2rem;">Summaries & Materials</p>
                </div>
                <div class="Cylinder__cell">
                    <h3>MATCH 🔥</h3>
                    <p style="font-size: 1.2rem;">Find your study buddy</p>
                </div>
                <div class="Cylinder__cell">
                    <h3>AI CHAT 🤖</h3>
                    <p style="font-size: 1.2rem;">Your smart assistant</p>
                </div>
                <div class="Cylinder__cell" id ="guid">
                    <h3>GUIDE 📌</h3>
                    <p style="font-size: 1.2rem;">Freshmen Survival Kit</p>
                </div>
            </div>
        </div>

        <div class="controls" id="controls" style="display: none;">
            <button class="control-btn" id="prev-btn">◀ PREV</button>
            <button class="control-btn" id="next-btn">NEXT ▶</button>
        </div>
    </div>

    <script src="../javaScript/home.js"></script>
</body>
</html>
