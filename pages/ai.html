<html>
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Buddy AI</title>
    <link rel="stylesheet" href="../css/ai.css">
</head>
<body>
    <div class="ai-container">
        <div class="ai-header">
            <div>
                <h1>Study Buddy AI</h1>
                <p>Ask a question, request study notes, or get quick explanations for your courses. Your AI study assistant is ready.</p>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="chat-message bot">Hello! I'm Study Buddy AI. Tell me what you're studying and I will help you with summaries, explanations, and tips.</div>
        </div>

        <form class="chat-form" id="chatForm">
            <input id="messageInput" type="text" placeholder="Type your study question..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>

    <script src="../javaScript/ai.js"></script>
</body>
</html>
