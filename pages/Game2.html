<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle</title>
    <link rel="stylesheet" href="../css/Game2.css"></head>
<body>

     <div id="floating-letters"></div>

    <h1>WORDLE</h1>
    
    <div id="message-container">
        <div id="message" class="message"></div>
    </div>

    <div id="board"></div>
    <div id="keyboard"></div>

    <div id="result-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">You Win! 🎉</h2>
            <p>The word was: <span id="modal-word"></span></p>
            <button id="play-again-btn">Play Again</button>
        </div>
    </div>

<script src="../javaScript/Game2.js"></script>
</body>
</html>
