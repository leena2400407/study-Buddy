<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Buddy</title>
    <link rel="stylesheet" href="css/home.css"> 
</head>
<body>

    <div id="bg-effects"></div>

    <div id="home-page">
       <div id="main-logo"><img width="400px" height="250px" src="assests/WhatsApp_Image_2026-03-19_at_11.23.23_PM-removebg-preview.png"></div>
        <h1 class="title">STUDY BUDDY</h1>
        <p style="font-size: 1.3rem; color: #e0e0e0; font-weight: 500;">Your Vibe. Your Squad. Your Success. ✨</p>
        <div class="btn-container">
            <button class="main-btn" id="btn-edugate">🎓 Edugate</button>
            <button class="main-btn" id="btn-features">🚀 Features</button>
        </div>
    </div>

    <div id="features-page">
        <div class="logo-placeholder" id="trigger-logo">START</div>

        <div class="scene" id="cylinder-scene">
            <div class="Cylinder" id="Cylinder">
                <div class="Cylinder__cell">
                    <h3>EVENTS 🎭</h3>
                    <p style="font-size: 1.2rem; margin-top: 10px;">Fun & Sports</p>
                </div>
                <div class="Cylinder__cell">
                    <h3>GAME 🎮</h3>
                    <p style="font-size: 1.2rem;">Block Blast</p>
                </div>
                <div class="Cylinder__cell" id="resources-card">
                    <h3>RESOURCES 📚</h3>
                    <p style="font-size: 1.2rem;">Summaries & Materials</p>
                    <div style="margin-top: 30px; padding: 10px 20px; background: rgba(0, 242, 254, 0.2); border-radius: 20px; border: 1px solid #00F2FE;">
                        👉 Click to Open Book
                    </div>
                </div>
                <div class="Cylinder__cell">
                    <h3>MATCH 🔥</h3>
                    <p style="font-size: 1.2rem;">Find your study buddy</p>
                </div>
                <div class="Cylinder__cell">
                    <h3>AI CHAT 🤖</h3>
                    <p style="font-size: 1.2rem;">Your smart assistant</p>
                </div>
                <div class="Cylinder__cell">
                    <h3>GUIDE 📌</h3>
                    <p style="font-size: 1.2rem;">Freshmen Survival Kit</p>
                </div>
            </div>
        </div>

        <div class="controls" id="controls" style="display: none;">
            <button class="control-btn" id="prev-btn">◀ PREV</button>
            <button class="control-btn" id="next-btn">NEXT ▶</button>
        </div>
    </div>

    <script src="javaScript/home.js"></script>
</body>
</html>
